<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MOCKUP · แคตตาล็อกบริการ · Lashbkk24</title>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@500;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{ --pink:#e75a8a; --pink2:#ff9ec4; --pink3:#ffc2d8; --soft:#fff0f6; --ink:#5a4a52; --muted:#9b8b92; --line:#ffd9e6; }
  *{box-sizing:border-box;}
  body{margin:0;background:linear-gradient(135deg,#fff4f9,#ffe3ee);font-family:'Prompt',sans-serif;color:var(--ink);min-height:100vh;}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px 50px;}
  .mock-tag{display:block;text-align:center;font-size:11px;color:#b9770a;background:#fff4e5;border:1px dashed #ffcf8a;border-radius:999px;padding:4px 10px;margin:14px auto 12px;width:fit-content;}

  .hero{background:linear-gradient(135deg,#ff9ec4,#ffc2d8);border-radius:22px;padding:26px 20px;text-align:center;color:#fff;box-shadow:0 10px 30px rgba(231,90,138,.18);margin-bottom:8px;}
  .hero .flower{font-size:34px;}
  .hero h1{font-family:'Mali',sans-serif;font-size:30px;margin:4px 0 2px;}
  .hero p{margin:0;font-size:14px;opacity:.95;}
  .hero .pill{display:inline-block;margin-top:12px;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.5);border-radius:999px;padding:6px 16px;font-size:13px;font-weight:500;}

  .sec{font-family:'Mali',sans-serif;color:var(--pink);font-size:18px;text-align:center;margin:26px 0 14px;}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  @media(min-width:560px){ .grid{grid-template-columns:repeat(3,1fr);} }
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 6px 20px rgba(231,90,138,.08);display:flex;flex-direction:column;}
  .ph{position:relative;width:100%;aspect-ratio:4/5;overflow:hidden;background:linear-gradient(110deg,#ffeef5 30%,#ffd9e6 50%,#ffeef5 70%);background-size:220% 100%;animation:sh 1.2s infinite linear;}
  .ph img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .3s;}
  .ph img.loaded{opacity:1;}
  @keyframes sh{to{background-position:-220% 0;}}
  .price{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#ff9ec4,#e75a8a);color:#fff;font-weight:700;font-size:14px;padding:5px 11px;border-radius:999px;box-shadow:0 3px 10px rgba(231,90,138,.3);}
  .hit{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,#ffb347,#ff7b54);color:#fff;font-weight:700;font-size:11px;padding:4px 9px;border-radius:999px;}
  .info{padding:12px 12px 14px;text-align:center;}
  .info .nm{font-weight:600;font-size:15px;color:var(--ink);line-height:1.3;}
  .info .meta{font-size:12px;color:var(--muted);margin-top:3px;}

  .cta{display:block;text-align:center;background:linear-gradient(135deg,#ff9ec4,#e75a8a);color:#fff;text-decoration:none;font-weight:600;font-size:16px;padding:15px;border-radius:999px;margin:28px 0 6px;box-shadow:0 8px 24px rgba(231,90,138,.25);}
  .foot{text-align:center;font-size:12px;color:var(--muted);margin-top:10px;}
</style>
</head>
<body>
<div class="wrap">
  <span class="mock-tag">MOCKUP · ตัวอย่างแคตตาล็อก (ยังไม่ใช่ของจริง)</span>

  <div class="hero">
    <div class="flower">🌸</div>
    <h1>Lashbkk24</h1>
    <p>แคตตาล็อกบริการต่อขนตา · Private Studio</p>
    <span class="pill">✨ ไม่จำกัดเส้น & ความยาว · เคลมฟรี</span>
  </div>

  <div class="sec">เลือกสไตล์ที่ใช่สำหรับคุณ 💕</div>

  <div class="grid" id="grid"></div>

  <a class="cta" href="https://two4lash-studio.onrender.com/" target="_blank" rel="noopener">📅 จองคิวเลย — เปิด 24 ชม.</a>
  <p class="foot">🌐 two4lash-studio.onrender.com</p>
</div>

<script>
  const ITEMS = [
    { img:'classic.jpg',        name:'Classic Lash',     price:599 },
    { img:'monako.jpg',         name:'Monako',           price:699 },
    { img:'anime.jpg',          name:'Anime',            price:699 },
    { img:'whispy-classic.jpg', name:'Whispy Classic',   price:749 },
    { img:'wet-3d4d.jpg',       name:'Wet Look 3D-4D',   price:749 },
    { img:'whispy-volume.jpg',  name:'Whispy Volume',    price:899 },
    { img:'wet-5d10d.jpg',      name:'Wet Look 5D-10D',  price:899 },
    { img:'wet-whispy.jpg',     name:'Wet Wispy',        price:899 },
    { img:'mega-volume.jpg',    name:'Mega Volume',      price:1350, hit:true },
  ];
  const grid = document.getElementById('grid');
  grid.innerHTML = ITEMS.map((it) => `
    <div class="card">
      <div class="ph">
        ${it.hit ? '<span class="hit">🔥 ยอดฮิต</span>' : ''}
        <span class="price">฿${it.price.toLocaleString()}</span>
        <img loading="lazy" src="catalogue/${it.img}" alt="${it.name}" onload="this.classList.add('loaded')" onerror="this.classList.add('loaded')" />
      </div>
      <div class="info">
        <div class="nm">${it.name}</div>
        <div class="meta">ไม่จำกัดเส้น+เคลมฟรี · ~60 นาที</div>
      </div>
    </div>`).join('');
</script>
</body>
</html>
