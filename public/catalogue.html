<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>แคตตาล็อกบริการ · Lashbkk24</title>
<meta name="description" content="แคตตาล็อกบริการต่อขนตา Lashbkk24 — เลือกสไตล์ที่ใช่ จองคิวออนไลน์ได้ 24 ชม." />
<meta property="og:title" content="แคตตาล็อกบริการ · Lashbkk24" />
<meta property="og:description" content="เลือกสไตล์ขนตาที่ใช่ · จองคิวออนไลน์ 24 ชม." />
<meta property="og:image" content="https://two4lash-studio.onrender.com/og-image-v2.png" />
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@500;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{ --pink:#e75a8a; --pink2:#ff9ec4; --pink3:#ffc2d8; --soft:#fff0f6; --ink:#5a4a52; --muted:#9b8b92; --line:#ffd9e6; }
  *{box-sizing:border-box;}
  body{margin:0;background:linear-gradient(135deg,#fff4f9,#ffe3ee);font-family:'Prompt',sans-serif;color:var(--ink);min-height:100vh;}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px 50px;}

  .hero{background:linear-gradient(135deg,#ff9ec4,#ffc2d8);border-radius:0 0 26px 26px;padding:30px 20px 24px;text-align:center;color:#fff;box-shadow:0 10px 30px rgba(231,90,138,.18);margin-bottom:6px;}
  .hero .flower{font-size:34px;}
  .hero h1{font-family:'Mali',sans-serif;font-size:30px;margin:4px 0 2px;}
  .hero p{margin:0;font-size:14px;opacity:.95;}
  .hero .pill{display:inline-block;margin-top:12px;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.5);border-radius:999px;padding:6px 16px;font-size:13px;font-weight:500;}

  .sec{font-family:'Mali',sans-serif;color:var(--pink);font-size:18px;text-align:center;margin:24px 0 14px;}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  @media(min-width:560px){ .grid{grid-template-columns:repeat(3,1fr);} }
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 6px 20px rgba(231,90,138,.08);display:flex;flex-direction:column;}
  .ph{position:relative;width:100%;aspect-ratio:4/5;overflow:hidden;background:linear-gradient(110deg,#ffeef5 30%,#ffd9e6 50%,#ffeef5 70%);background-size:220% 100%;animation:sh 1.2s infinite linear;cursor:pointer;}
  .ph img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .3s;}
  .ph img.loaded{opacity:1;}
  @keyframes sh{to{background-position:-220% 0;}}
  .price{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#ff9ec4,#e75a8a);color:#fff;font-weight:700;font-size:14px;padding:5px 11px;border-radius:999px;box-shadow:0 3px 10px rgba(231,90,138,.3);}
  .hit{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,#ffb347,#ff7b54);color:#fff;font-weight:700;font-size:11px;padding:4px 9px;border-radius:999px;}
  .info{padding:12px 12px 14px;text-align:center;}
  .info .nm{font-weight:600;font-size:15px;color:var(--ink);line-height:1.3;}
  .info .meta{font-size:12px;color:var(--muted);margin-top:3px;}

  .cta{display:block;text-align:center;background:linear-gradient(135deg,#ff9ec4,#e75a8a);color:#fff;text-decoration:none;font-weight:600;font-size:16px;padding:15px;border-radius:999px;margin:28px 0 6px;box-shadow:0 8px 24px rgba(231,90,138,.25);}
  .foot{text-align:center;font-size:12px;color:var(--muted);margin-top:10px;}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 20px;line-height:1.7;}

  /* lightbox */
  #lb{position:fixed;inset:0;background:rgba(90,74,82,.82);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  #lb.show{display:flex;}
  #lb img{max-width:100%;max-height:84vh;border-radius:16px;box-shadow:0 12px 50px rgba(0,0,0,.4);}
  #lb .x{position:absolute;top:18px;right:20px;width:42px;height:42px;border-radius:50%;border:none;background:rgba(255,255,255,.9);color:#e75a8a;font-size:18px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="flower">🌸</div>
    <h1 id="shopName">Lashbkk24</h1>
    <p>แคตตาล็อกบริการต่อขนตา · Private Studio</p>
    <span class="pill">✨ ไม่จำกัดเส้น & ความยาว · เคลมฟรี</span>
  </div>

  <div class="sec">เลือกสไตล์ที่ใช่สำหรับคุณ 💕</div>
  <div class="grid" id="grid"></div>
  <div class="empty hide" id="empty"></div>

  <a class="cta" href="/" >📅 จองคิวเลย — เปิด 24 ชม.</a>
  <p class="foot">🌐 two4lash-studio.onrender.com</p>
</div>

<div id="lb"><img id="lbImg" alt="ตัวอย่างผลงาน" /><button class="x" id="lbX" type="button">✕</button></div>

<script>
  function shortName(name){ return String(name).split(/\s*(?:ไม่จำกัด|\/|\()/)[0].trim() || name; }

  function openLb(url){ document.getElementById('lbImg').src=url; document.getElementById('lb').classList.add('show'); }
  document.getElementById('lbX').addEventListener('click',()=>document.getElementById('lb').classList.remove('show'));
  document.getElementById('lb').addEventListener('click',(e)=>{ if(e.target.id==='lb') e.currentTarget.classList.remove('show'); });

  (async function(){
    const grid=document.getElementById('grid');
    try{
      const c=await (await fetch('/api/config')).json();
      if(c.shop && c.shop.name) document.getElementById('shopName').textContent=c.shop.name;
      const photos=c.photos||{};
      // เฉพาะบริการที่มีรูป — ยอดฮิตขึ้นก่อน
      const items=c.services
        .map((s,i)=>({s,i,pics:photos[s.id]||[]}))
        .filter(x=>x.pics.length)
        .sort((a,b)=>(b.s.popular?1:0)-(a.s.popular?1:0)||a.i-b.i);

      if(!items.length){
        grid.classList.add('hide');
        const e=document.getElementById('empty');
        e.classList.remove('hide');
        e.innerHTML='ยังไม่มีบริการที่มีรูปในแคตตาล็อก<br>เพิ่มรูปได้ที่ <b>หลังบ้าน → ตั้งค่า → บริการ → อัปรูป</b>';
        return;
      }

      grid.innerHTML=items.map(({s,pics})=>{
        const first=pics[0];
        const thumb=first.thumb||first.full||first;
        const full=first.full||first.thumb||first;
        return `<div class="card">
          <div class="ph" data-full="${full}">
            ${s.popular?'<span class="hit">🔥 ยอดฮิต</span>':''}
            <span class="price">฿${(Number(s.price)||0).toLocaleString()}</span>
            <img loading="lazy" src="${thumb}" alt="${shortName(s.name)}" onload="this.classList.add('loaded')" onerror="this.classList.add('loaded')" />
          </div>
          <div class="info">
            <div class="nm">${shortName(s.name)}</div>
            <div class="meta">ไม่จำกัดเส้น+เคลมฟรี · ~${s.duration} นาที</div>
          </div>
        </div>`;
      }).join('');

      grid.querySelectorAll('.ph').forEach(p=>p.addEventListener('click',()=>openLb(p.dataset.full)));
      // พรีโหลดรูปใหญ่ไว้ดูเต็มจอแบบไว
      setTimeout(()=>items.forEach(({pics})=>{ const im=new Image(); im.src=(pics[0].full||pics[0].thumb||pics[0]); }),800);
    }catch(e){
      grid.innerHTML='<div class="empty">โหลดแคตตาล็อกไม่สำเร็จ ลองรีเฟรชอีกครั้งค่ะ</div>';
    }
  })();
</script>
</body>
</html>
