name: Keep Render awake

# ปลุกเว็บบน Render (ตัวฟรี) ไม่ให้หลับ โดยยิงเข้า health endpoint ทุก ~10 นาที
on:
  schedule:
    - cron: "*/10 * * * *"   # ทุก 10 นาที (เวลา GitHub อาจดีเลย์ได้บ้าง)
  workflow_dispatch:          # กดรันเองได้จากแท็บ Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site
        run: |
          for url in \
            "https://two4lash-studio.onrender.com/api/health" \
            "https://two4lash-studio.onrender.com/"; do
            echo "Pinging $url"
            curl -s -m 60 -o /dev/null -w "  -> HTTP %{http_code} in %{time_total}s\n" "$url" || echo "  -> ping failed (ignored)"
          done
